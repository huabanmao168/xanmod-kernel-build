name: Build XanMod Kernel

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'patches/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      use_latest:
        description: '自动探测 xanmod 源最新版本'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole \
            fakeroot rsync curl wget git \
            llvm clang lld zstd cpio

      - name: Resolve kernel version
        run: |
          if [ "${{ github.event.inputs.use_latest }}" = "true" ]; then
            echo "=== 自动探测最新 xanmod 版本 ==="
            LATEST=$(curl -s "https://deb.xanmod.org/dists/trixie/main/binary-amd64/Packages.gz" \
              | zcat \
              | grep "^Package: linux-image-.*-x64v3-xanmod" \
              | grep -oE "[0-9]+\.[0-9]+\.[0-9]+-x64v3-xanmod[0-9]+" \
              | sort -V | tail -1)
            # 提取基础版本
            BASE=$(echo "$LATEST" | cut -d- -f1)
            TAG_SUFFIX=$(echo "$LATEST" | sed "s/${BASE}-x64v3-//")
          else
            SOURCE_PKG=$(grep '^SOURCE_PKG=' config/kernel_version | cut -d= -f2)
            BASE=$(echo "$SOURCE_PKG" | cut -d- -f1)
            TAG_SUFFIX=$(echo "$SOURCE_PKG" | sed "s/${BASE}-x64v3-//")
          fi

          TARGET_ARCH=$(grep '^TARGET_ARCH=' config/kernel_version | cut -d= -f2)
          MAJOR=$(echo "$BASE" | cut -d. -f1-2)
          # XanMod GitHub tag 格式: 7.0.12-xanmod1
          GIT_TAG="${BASE}-${TAG_SUFFIX}"

          echo "BASE_VER=$BASE"           >> $GITHUB_ENV
          echo "TARGET_ARCH=$TARGET_ARCH" >> $GITHUB_ENV
          echo "XANMOD_TAG=$TAG_SUFFIX"   >> $GITHUB_ENV
          echo "MAJOR_VER=$MAJOR"         >> $GITHUB_ENV
          echo "GIT_TAG=$GIT_TAG"         >> $GITHUB_ENV
          echo "PKG_VER=${BASE}-${TARGET_ARCH}-${TAG_SUFFIX}" >> $GITHUB_ENV

          echo ""
          echo "=== 构建计划 ==="
          echo "GitHub tag: $GIT_TAG"
          echo "目标架构: $TARGET_ARCH"
          echo "内核版本: $BASE"
          echo "产物版本: ${BASE}-${TARGET_ARCH}-${TAG_SUFFIX}"

      - name: Download XanMod kernel source
        run: |
          echo "=== 从 GitLab 下载 xanmod/linux tag: ${GIT_TAG} ==="
          echo "注意：XanMod 2024年底从 GitHub 搬到 GitLab，源码已内置所有补丁"
          wget -q "https://gitlab.com/xanmod/linux/-/archive/${GIT_TAG}/linux-${GIT_TAG}.tar.gz" -O xanmod-src.tar.gz
          echo "✅ 下载完成 ($(du -h xanmod-src.tar.gz | cut -f1))"
          tar xf xanmod-src.tar.gz
          mv linux-${GIT_TAG} kernel-src
          rm -f xanmod-src.tar.gz
          echo "✅ 解压完成"
          ls kernel-src/Makefile

      - name: Setup kernel config
        run: |
          cd kernel-src

          # 用仓库里的 config 作为基础
          cp "${GITHUB_WORKSPACE}/config/kernel.config" .config

          # 关键选项覆盖
          scripts/config --disable CONFIG_HZ_100
          scripts/config --disable CONFIG_HZ_250
          scripts/config --disable CONFIG_HZ_300
          scripts/config --disable CONFIG_HZ_1000
          scripts/config --enable  CONFIG_HZ_500
          scripts/config --set-val CONFIG_HZ 500

          # x64v4 AVX-512
          scripts/config --set-val CONFIG_X86_64_VERSION 4

          # BBR 默认
          scripts/config --enable  CONFIG_TCP_CONG_BBR
          scripts/config --set-str CONFIG_DEFAULT_TCP_CONG "bbr"

          # Cloudflare TCP collapse sysctl
          scripts/config --enable CONFIG_TCP_COLLAPSE_SYSCTL 2>/dev/null || true

          # fullcone NAT
          scripts/config --enable CONFIG_NF_NAT_FULLCONE 2>/dev/null || true
          scripts/config --enable CONFIG_NFT_FULLCONE 2>/dev/null || true

          # FLOWOFFLOAD
          scripts/config --module CONFIG_NETFILTER_XT_TARGET_FLOWOFFLOAD 2>/dev/null || true

          make olddefconfig LLVM=1

          echo "=== 关键配置确认 ==="
          grep -E "^CONFIG_HZ=|HZ_500|X86_64_VERSION|TCP_CONG_BBR|DEFAULT_TCP|FULLCONE|FLOWOFFLOAD|COLLAPSE" .config || true

      - name: Build kernel .deb packages
        run: |
          cd kernel-src
          NPROC=$(nproc)
          echo "=== 开始编译 (${NPROC} 核心) ==="
          make -j${NPROC} LLVM=1 bindeb-pkg \
            LOCALVERSION="-${TARGET_ARCH}-${XANMOD_TAG}" \
            2>&1 | tail -50
          echo "✅ 编译完成"

      - name: Collect packages
        run: |
          mkdir -p dist
          find . -maxdepth 1 -name "*.deb" -exec mv {} dist/ \;
          find .. -maxdepth 1 -name "*.deb" -exec mv {} dist/ \; 2>/dev/null || true
          echo "=== 产物 ==="
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "kernel-${{ env.PKG_VER }}"
          name: "XanMod ${{ env.PKG_VER }}"
          body: |
            ## XanMod ${{ env.PKG_VER }}

            **XanMod 源码 tag**: ${{ env.GIT_TAG }}
            **目标指令集**: ${{ env.TARGET_ARCH }} (AVX-512)
            **定时器**: 500Hz

            ### 包含补丁（XanMod 源码已内置）
            - BBR v3
            - Cloudflare TCP collapse skip
            - fullcone NAT
            - xt_FLOWOFFLOAD
            - ClearLinux 调度优化
            - mm 工作集保护
            - ZEN dm-crypt 直接加解密
            - XanMod 核心优化

            ### 安装
            ```bash
            wget $(curl -s https://api.github.com/repos/huabanmao168/xanmod-kernel-build/releases/latest \
              | grep "browser_download_url.*linux-image.*deb" | head -1 | cut -d'"' -f4)
            dpkg -i linux-image-*.deb
            update-grub && reboot
            # 验证
            uname -r && sysctl net.ipv4.tcp_congestion_control
            ```
          files: dist/*.deb
          fail_on_unmatched_files: false
