name: Build XanMod Kernel

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'patches/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '指定版本 (留空=自动用 config/kernel_version)'
        required: false
        default: ''
      use_latest:
        description: '自动拉 xanmod 源最新版本'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole \
            dpkg-dev fakeroot rsync curl wget git \
            llvm clang lld

      - name: Resolve kernel version
        id: version
        run: |
          if [ "${{ github.event.inputs.use_latest }}" = "true" ]; then
            echo "=== 自动探测最新 xanmod 版本 ==="
            LATEST=$(curl -s "https://deb.xanmod.org/dists/trixie/main/binary-amd64/Packages.gz" \
              | zcat \
              | grep "^Package: linux-image-.*-x64v4-xanmod" \
              | grep -oE "[0-9]+\.[0-9]+\.[0-9]+-x64v4-xanmod[0-9]+" \
              | sort -V | tail -1)
            echo "最新版本: $LATEST"
            echo "KERNEL_VER=$LATEST" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.kernel_version }}" ]; then
            echo "KERNEL_VER=${{ github.event.inputs.kernel_version }}" >> $GITHUB_ENV
          else
            echo "KERNEL_VER=$(cat config/kernel_version | tr -d '[:space:]')" >> $GITHUB_ENV
          fi

      - name: Parse version components
        run: |
          VER="${KERNEL_VER}"
          BASE=$(echo "$VER" | cut -d- -f1)          # 7.0.12
          ARCH=$(echo "$VER" | cut -d- -f2)           # x64v4
          TAG=$(echo "$VER" | cut -d- -f3)            # xanmod1
          MAJOR=$(echo "$BASE" | cut -d. -f1-2)       # 7.0
          echo "BASE_VER=$BASE"      >> $GITHUB_ENV
          echo "ARCH_VER=$ARCH"      >> $GITHUB_ENV
          echo "XANMOD_TAG=$TAG"     >> $GITHUB_ENV
          echo "MAJOR_VER=$MAJOR"    >> $GITHUB_ENV
          echo "PKG_VER=${BASE}-${ARCH}-${TAG}" >> $GITHUB_ENV
          echo ""
          echo "=== 构建目标 ==="
          echo "内核版本: $BASE"
          echo "指令集:   $ARCH"
          echo "XanMod:  $TAG"

      - name: Download XanMod kernel source
        run: |
          DEB_URL="https://deb.xanmod.org/pool/main/l/linux-xanmod"
          ORIG="linux-xanmod_${BASE_VER}.orig.tar.xz"
          DSC="linux-xanmod_${PKG_VER}.dsc"
          DEBIAN="linux-xanmod_${PKG_VER}.debian.tar.xz"

          echo "=== 下载内核源码 ==="
          wget -q --show-progress "${DEB_URL}/${ORIG}"
          wget -q --show-progress "${DEB_URL}/${DSC}"
          wget -q --show-progress "${DEB_URL}/${DEBIAN}"

          dpkg-source -x "${DSC}" kernel-src

      - name: Apply custom patches
        run: |
          cd kernel-src
          PATCH_DIR="${GITHUB_WORKSPACE}/patches"
          GITLAB_BASE="https://gitlab.com/xanmod/linux-patches/-/raw/master/linux-${MAJOR_VER}.y-xanmod"

          echo "=== 应用补丁 ==="
          # 读 patch_list，跳过空行和注释
          grep -v '^\s*#' "${GITHUB_WORKSPACE}/config/patch_list" | grep -v '^\s*$' | while read patch; do
            if [ -f "${PATCH_DIR}/${patch}" ]; then
              echo "[本地] $patch"
              patch -p1 < "${PATCH_DIR}/${patch}"
            else
              echo "[远程] $patch"
              curl -fsSL "${GITLAB_BASE}/${patch}" | patch -p1
            fi
          done
          echo "=== 补丁应用完成 ==="

      - name: Setup kernel config
        run: |
          cp config/kernel.config kernel-src/.config
          cd kernel-src

          # 确保关键选项正确
          # HZ=500
          scripts/config --disable CONFIG_HZ_250
          scripts/config --enable  CONFIG_HZ_500
          scripts/config --set-val CONFIG_HZ 500

          # x64v4
          scripts/config --set-val CONFIG_X86_64_VERSION 4

          # 默认 BBR
          scripts/config --enable  CONFIG_TCP_CONG_BBR
          scripts/config --set-str CONFIG_DEFAULT_TCP_CONG bbr

          make olddefconfig LLVM=1
          echo "=== 关键配置确认 ==="
          grep -E "^CONFIG_HZ=|HZ_500|X86_64_VERSION|TCP_CONG_BBR|DEFAULT_TCP" .config

      - name: Build kernel .deb packages
        run: |
          cd kernel-src
          NPROC=$(nproc)
          echo "=== 开始编译，$NPROC 核心 ==="
          make -j${NPROC} LLVM=1 bindeb-pkg \
            LOCALVERSION="" \
            2>&1 | tail -30
          echo "=== 编译完成 ==="

      - name: Collect packages
        run: |
          mkdir -p dist
          mv ../*.deb dist/ 2>/dev/null || true
          echo "=== 产物 ==="
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "kernel-${{ env.PKG_VER }}"
          name: "XanMod ${{ env.PKG_VER }}"
          body: |
            ## XanMod ${{ env.PKG_VER }}

            ### 改动（相比官方预编译包）
            - 定时器频率: **500Hz**（官方 250Hz）
            - 指令集: **x64v4 AVX-512**
            - 新增: Cloudflare TCP / fullcone NAT / FLOWOFFLOAD

            ### 安装
            ```bash
            wget $(curl -s https://api.github.com/repos/huabanmao168/xanmod-kernel-build/releases/latest | grep "browser_download_url.*linux-image.*deb" | cut -d'"' -f4)
            dpkg -i linux-image-*.deb
            reboot
            # 验证
            uname -r && sysctl net.ipv4.tcp_congestion_control && modinfo tcp_bbr | grep version
            ```
          files: dist/*.deb
          fail_on_unmatched_files: false
