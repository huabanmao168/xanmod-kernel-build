name: Build XanMod Kernel

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      use_latest:
        description: '自动探测最新版本'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm /usr/local/lib/heroku /usr/local/.ghcup
          sudo apt-get clean
          echo "可用磁盘:"
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev dwarves pahole \
            fakeroot rsync curl wget \
            llvm clang lld zstd cpio kmod

      - name: Resolve kernel version
        run: |
          if [ "${{ github.event.inputs.use_latest }}" = "true" ]; then
            echo "=== 自动探测最新版本 ==="
            LATEST=$(curl -s "https://deb.xanmod.org/dists/trixie/main/binary-amd64/Packages.gz" \
              | zcat \
              | grep "^Package: linux-image-.*-x64v3-xanmod" \
              | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" \
              | sort -V | tail -1)
            BASE_VER="$LATEST"
          else
            BASE_VER=$(grep '^SOURCE_VER=' config/version | cut -d= -f2)
          fi

          XANMOD_TAG=$(grep '^XANMOD_TAG=' config/version | cut -d= -f2)
          TARGET_ARCH=$(grep '^TARGET_ARCH=' config/version | cut -d= -f2)
          GIT_TAG="${BASE_VER}-${XANMOD_TAG}"
          MAJOR_VER=$(echo "$BASE_VER" | cut -d. -f1-2)

          echo "BASE_VER=$BASE_VER"       >> $GITHUB_ENV
          echo "XANMOD_TAG=$XANMOD_TAG"   >> $GITHUB_ENV
          echo "TARGET_ARCH=$TARGET_ARCH" >> $GITHUB_ENV
          echo "GIT_TAG=$GIT_TAG"         >> $GITHUB_ENV
          echo "MAJOR_VER=$MAJOR_VER"     >> $GITHUB_ENV

          echo ""
          echo "=============================="
          echo " 内核: $BASE_VER"
          echo " Tag:  $GIT_TAG"
          echo " 架构: $TARGET_ARCH"
          echo "=============================="

      - name: Clone XanMod source (shallow)
        run: |
          echo "=== 从 GitLab shallow clone tag: ${GIT_TAG} ==="
          git clone --depth=1 --branch "${GIT_TAG}" \
            "https://gitlab.com/xanmod/linux.git" kernel-src
          echo "✅ clone 完成"
          ls kernel-src/Makefile
          head -5 kernel-src/Makefile

      - name: Configure kernel
        run: |
          cd kernel-src

          # 用仓库里的精简 config（来自生产机 .221，已去掉无用驱动）
          cp "${GITHUB_WORKSPACE}/config/machine.config" .config
          echo "✅ 使用生产机精简 config"

          # 覆盖关键选项
          echo "=== 覆盖配置 ==="

          # HZ = 500
          scripts/config --disable CONFIG_HZ_100
          scripts/config --disable CONFIG_HZ_250
          scripts/config --disable CONFIG_HZ_300
          scripts/config --disable CONFIG_HZ_1000
          scripts/config --enable  CONFIG_HZ_500
          scripts/config --set-val CONFIG_HZ 500

          # x64v4 (AVX-512)
          scripts/config --set-val CONFIG_X86_64_VERSION 4

          # BBR 默认拥塞控制
          scripts/config --enable  CONFIG_TCP_CONG_BBR
          scripts/config --set-str CONFIG_DEFAULT_TCP_CONG "bbr"

          # fq 默认 qdisc
          scripts/config --set-str CONFIG_DEFAULT_NET_SCH "fq"

          # === 网络补丁选项（XanMod 源码有代码但 config 可能没开） ===
          # fullcone NAT
          scripts/config --module CONFIG_NFT_FULLCONE
          # FLOWOFFLOAD
          scripts/config --module CONFIG_NETFILTER_XT_TARGET_FLOWOFFLOAD
          # NF_FLOW_TABLE (FLOWOFFLOAD 的依赖)
          scripts/config --module CONFIG_NF_FLOW_TABLE
          scripts/config --enable CONFIG_NETFILTER_INGRESS
          # Cloudflare TCP collapse — 无 Kconfig 开关，编进即有，运行时 sysctl 启用

          # === 关闭 debug 减小体积加速编译 ===
          scripts/config --disable CONFIG_DEBUG_INFO_BTF
          scripts/config --disable CONFIG_DEBUG_INFO_DWARF5
          scripts/config --disable CONFIG_DEBUG_INFO_DWARF4
          scripts/config --disable CONFIG_DEBUG_INFO
          scripts/config --enable  CONFIG_DEBUG_INFO_NONE

          make olddefconfig LLVM=1

          echo ""
          echo "=== 关键配置确认 ==="
          grep -E "^CONFIG_HZ=|HZ_500|X86_64_VERSION|TCP_CONG_BBR|DEFAULT_TCP_CONG|DEFAULT_NET_SCH|DEBUG_INFO_NONE|NFT_FULLCONE|XT_TARGET_FLOWOFFLOAD|NF_FLOW_TABLE" .config

      - name: Build kernel
        run: |
          cd kernel-src
          NPROC=$(nproc)
          echo "=== 开始编译 ($NPROC 核心) ==="

          # pipefail 确保 make 失败能被捕获
          set -o pipefail
          make -j$NPROC LLVM=1 bindeb-pkg \
            LOCALVERSION="-${TARGET_ARCH}-${XANMOD_TAG}" \
            KDEB_PKGVERSION="$(date +%Y%m%d)" \
            2>&1 | tee /tmp/build.log | tail -50

          echo "✅ 编译完成"
          echo "=== deb 产物 ==="
          ls -lh ../*.deb

      - name: Collect packages
        run: |
          mkdir -p dist
          # bindeb-pkg 输出到源码目录上一级，即 $GITHUB_WORKSPACE
          mv *.deb dist/ 2>/dev/null || true
          mv kernel-src/../*.deb dist/ 2>/dev/null || true
          ls -lh dist/ || true

          if ! ls dist/*.deb 2>/dev/null; then
            echo "=== 搜索 deb 位置 ==="
            find . -name "*.deb" 2>/dev/null
            echo "❌ 没有找到 .deb 产物"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.GIT_TAG }}-${{ env.TARGET_ARCH }}"
          name: "XanMod ${{ env.BASE_VER }} (${{ env.TARGET_ARCH }})"
          body: |
            ## XanMod ${{ env.BASE_VER }} — 自定义编译

            | 项目 | 值 |
            |------|---|
            | 内核版本 | ${{ env.BASE_VER }} |
            | XanMod tag | ${{ env.GIT_TAG }} |
            | 指令集 | ${{ env.TARGET_ARCH }} (AVX-512) |
            | 定时器 | 500Hz |
            | 默认拥塞控制 | BBR v3 |
            | 默认 qdisc | fq |

            ### 安装
            ```bash
            curl -fsSL https://raw.githubusercontent.com/huabanmao168/xanmod-kernel-build/main/install.sh | bash
            reboot
            ```
          files: dist/*.deb
          fail_on_unmatched_files: false
